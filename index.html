<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SmartPlants</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/estilo.css" />
</head>
<body>
  <div class="app">
    <aside class="coluna-logo">
      <div class="marca">
        <h1 class="titulo">Smart<br>Plants</h1>
        <p class="assinatura">By Ervinha Inc.</p>
      </div>
    </aside>

    <main class="coluna-botoes">
      <a class="cartao cartao-biblioteca" href="plantas.html" aria-label="Biblioteca de Plantas">
        <span class="icone">🌿</span>
        <span class="texto">Biblioteca de Plantas</span>
      </a>
      <a class="cartao cartao-loja" href="loja.html"><span class="icone">👜</span><span class="texto">Loja</span></a>
      <a class="cartao cartao-streak" href="calendario.html"><span class="icone">💧</span><span class="texto">Streak</span></a>
      <!-- ícones pequenos -->
      <div class="rodape-icones">
        <button class="icone-opcao" title="Notificações">🔔</button>
        <button class="icone-opcao" title="Configurações">⚙️</button>
      </div>
    </main>

  </div>
  <script src="js/fontes.js"></script>

</html>
