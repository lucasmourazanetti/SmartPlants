<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SmartPlants – Plantas</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/loja_fontes.css" />
</head>
<body>
  <div class="app">
    <header class="topo">
      <a class="logo-topo" href="index.html" aria-label="Voltar para Home">
        <span class="marca-mini">Smart<br>Plants</span>
      </a>
      <nav class="abas">
        <a href="loja.html" class="aba">Fundos</a>
        <button class="aba ativa">Fontes</button>
        <button class="aba">Temas</button>
        <div class="carteira">
            🍃<span id="carteira-folhas">0</span>
        </div>
        <div class="busca">
          <input id="campo-busca" type="text" placeholder="Pesquisar..." />
          <button id="botao-filtro" title="Filtro">🔎</button>
        </div>
      </nav>
    </header>

    <main class="conteudo">
      <button id="reset-fonte" class="reset-btn">Restaurar fonte padrão</button>
      
      <section id="lista-fontes" class="grade">
            <button class="cartao-fonte" data-font="Comic Sans MS">Aa</button>
            <button class="cartao-fonte" data-font="Bauhaus93">Aa</button>
            <button class="cartao-fonte" data-font="Papyrus">Aa</button>
        <button class="cartao-fonte" data-font="Jokerman">Aa</button>
        <button class="cartao-fonte" data-font="Magneto">Aa</button>
        <button class="cartao-fonte" data-font="Determination">Aa</button>
        <button class="cartao-fonte" data-font="Standard Galactic Alphabet"></button>
        <button class="cartao-fonte" data-font="Wingdings">Aa</button>
      </section>
    </main>
  </div>
  <div id="alert-modal" class="alert-modal hidden">
  <div class="alert-box">
    <p id="alert-text"></p>
    <button id="alert-ok">OK</button>
  </div>
  </div>

<div id="confirm-modal" class="alert-modal hidden">
  <div class="alert-box">
    <p id="confirm-text"></p>
    <div style="display:flex; gap:12px; justify-content:center;">
      <button id="confirm-yes">Sim</button>
      <button id="confirm-no">Não</button>
    </div>
  </div>
</div>

<!-- ORDEM CORRIGIDA: fontes.js DEPOIS de fundo.js -->
<script src="js/fontes.js"></script>
<script src="js/fundo.js"></script>
</body>
</html>
